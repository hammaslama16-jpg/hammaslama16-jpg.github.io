<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-heavy">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="880" y1="0" x2="880" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="1040" y1="0" x2="1040" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="640" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#3b82f6" stroke-width="0.5"/>
  </g>

  <!-- Accent glow circles -->
  <circle cx="240" cy="320" r="280" fill="url(#accent1)" opacity="0.04" filter="url(#glow-heavy)"/>
  <circle cx="1040" cy="320" r="280" fill="url(#accent2)" opacity="0.04" filter="url(#glow-heavy)"/>

  <!-- Data visualization elements -->

  <!-- Bar chart (left) -->
  <g transform="translate(100, 200)" opacity="0.12">
    <rect x="0" y="60" width="24" height="140" rx="3" fill="#3b82f6"/>
    <rect x="32" y="30" width="24" height="170" rx="3" fill="#06b6d4"/>
    <rect x="64" y="80" width="24" height="120" rx="3" fill="#3b82f6"/>
    <rect x="96" y="45" width="24" height="155" rx="3" fill="#06b6d4"/>
    <rect x="128" y="100" width="24" height="100" rx="3" fill="#3b82f6"/>
    <rect x="160" y="55" width="24" height="145" rx="3" fill="#06b6d4"/>
    <rect x="192" y="70" width="24" height="130" rx="3" fill="#3b82f6"/>
    <rect x="224" y="25" width="24" height="175" rx="3" fill="#06b6d4"/>
  </g>

  <!-- Line chart (right) -->
  <g transform="translate(900, 220)" opacity="0.12">
    <polyline points="0,140 40,110 80,125 120,80 160,95 200,50 240,70 280,30"
      fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="140" r="4" fill="#3b82f6"/>
    <circle cx="40" cy="110" r="4" fill="#06b6d4"/>
    <circle cx="80" cy="125" r="4" fill="#3b82f6"/>
    <circle cx="120" cy="80" r="4" fill="#06b6d4"/>
    <circle cx="160" cy="95" r="4" fill="#3b82f6"/>
    <circle cx="200" cy="50" r="4" fill="#06b6d4"/>
    <circle cx="240" cy="70" r="4" fill="#3b82f6"/>
    <circle cx="280" cy="30" r="4" fill="#06b6d4"/>
  </g>

  <!-- Decorative dashed lines -->
  <line x1="0" y1="520" x2="1280" y2="520" stroke="#1e293b" stroke-width="1" stroke-dasharray="8,8" opacity="0.3"/>

  <!-- Main content -->
  <g transform="translate(640, 300)">

    <!-- Name -->
    <text text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="64" font-weight="900" fill="url(#text-grad)" letter-spacing="2">
      Mohamed Slama
    </text>

    <!-- Title -->
    <text text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace"
      font-size="22" fill="#3b82f6" font-weight="500" y="55" filter="url(#glow)"
      letter-spacing="3">
      DATA ANALYST
    </text>

    <!-- Subtitle -->
    <text text-anchor="middle" font-family="'Inter', -apple-system, sans-serif"
      font-size="16" fill="#8892a8" font-weight="400" y="85" letter-spacing="1">
      SQL  ·  Looker Studio  ·  Tableau  ·  Excel
    </text>

    <!-- Decorative line under title -->
    <line x1="-120" y1="105" x2="120" y2="105" stroke="url(#accent1)" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Bottom-left badge -->
  <g transform="translate(60, 560)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <circle cx="16" cy="14" r="4" fill="#22c55e"/>
    <text x="28" y="19" font-family="'JetBrains Mono', monospace" font-size="11" fill="#22c55e" font-weight="600">Open to Work</text>
  </g>

  <!-- Bottom-right stats -->
  <g transform="translate(930, 550)" opacity="0.5">
    <text x="0" y="0" font-family="'JetBrains Mono', monospace" font-size="13" fill="#8892a8">38K+ records processed</text>
    <text x="0" y="22" font-family="'JetBrains Mono', monospace" font-size="13" fill="#8892a8">14/14 SQL validations</text>
  </g>

</svg>
